<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- Ensure the page is responsive on mobile devices -->
    <!-- Include Bootstrap CSS for styling the form and table -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>VIMS Upload</title>
</head>
<style>
    input, select {
        font-size: 16px; /* Set a larger font size for better readability of input fields and dropdowns */
    }
</style>
<body class="bg-light">

    <!-- Main container for the page content, using Bootstrap classes for padding and margin -->
    <div class="container-fluid px-3 pt-4">

        <!-- Navigation buttons -->
        <div class="d-flex gap-2 mb-3">
            <button id="inventoryBtn" class="btn btn-primary w-100" onclick="showInventory()">Inventory</button>
            <button id="uploadBtn" class="btn btn-secondary w-100" onclick="showUpload()">Upload</button>
        </div>

        <!-- Upload form section, initially hidden and will be shown when the "Upload Item" button is clicked -->
        <div id="uploadView" style="display: none;"> <!-- Initially hide the upload form, it will be shown when the button is clicked -->
            
            <!-- Form for uploading shirt image and size data -->
            <h2>Upload Item</h2>
            
            <!-- The form element with an ID for JavaScript to target, and Bootstrap classes for styling -->
            <form id="uploadForm" class="card p-4 shadow-sm">

                <!-- File input for shirt image
                NOTE: type="file" allows users to select a file from their device
                NOTE: The 'name' attribute must match the expected field name in the backend -->
                <div class="mb-3">
                    <input type="file"  name="image" class="form-control" required>
                </div>

                <!-- Text input for display name
                NOTE: type="text" creates a single-line text input field
                NOTE: The 'name' attribute must match the expected field name in the backend -->
                <div class="mb-3">
                    <label for="display_name">Display Name:</label>
                    <input id="display_name" type="text" name="display_name" class="form-control" placeholder="Enter display item name">
                </div>

                <!-- Dropdown select for shirt category
                NOTE: The 'name' attribute must match the expected field name in the backend -->
                <div class="mb-3">
                    <label for="category">Category:</label>
                    <select id="category" name="category" class="form-control">
                        <option value="adult_10">Adult Shirt ($10)</option>
                        <option value="adult_15">Adult Shirt ($15)</option>
                        <option value="hoodie">Hoodie</option>
                        <option value="child">Child Shirt</option>
                    </select>
                </div>

                <!-- Size inputs 
                NOTE: type="number" creates a numeric input field
                NOTE: The 'name' attribute must match the expected field name in the backend
                NOTE: The 'min' attribute sets the minimum value for the input -->
                <div class="mb-3">
                    <label for="size_s">S:</label>
                    <input id="size_s" type="number" name="size_s" class="form-control" min="0">
                </div>

                <div class="mb-3">
                    <label for="size_m">M:</label>
                    <input id="size_m" type="number" name="size_m" class="form-control" min="0">
                </div>

                <div class="mb-3">
                    <label for="size_l">L:</label>
                    <input id="size_l" type="number" name="size_l" class="form-control" min="0">
                </div>

                <div class="mb-3">
                    <label for="size_xl">XL:</label>
                    <input id="size_xl" type="number" name="size_xl" class="form-control" min="0">
                </div>

                <div class="mb-3">
                    <label for="size_xxl">XXL:</label>
                    <input id="size_xxl" type="number" name="size_xxl" class="form-control" min="0">
                </div>

                <div class="mb-3">
                    <label for="size_xxxl">XXXL:</label>
                    <input id="size_xxxl" type="number" name="size_xxxl" class="form-control" min="0">
                </div>

                <div class="mb-3">
                    <label for="size_6m">6M:</label>
                    <input id="size_6m" type="number" name="size_6m" class="form-control" min="0">
                </div>

                <div class="mb-3">
                    <label for="size_12m">12M:</label>
                    <input id="size_12m" type="number" name="size_12m" class="form-control" min="0">
                </div>

                <div class="mb-3">
                    <label for="size_24m">24M:</label>
                    <input id="size_24m" type="number" name="size_24m" class="form-control" min="0">
                </div>

                <!-- Submit button to upload the form data to the backend -->
                <button type="submit" class="btn btn-primary w-100 mt-3">Upload</button>

                <!-- Cancel button to switch back to the inventory view without submitting the form -->
                <button type="button" class="btn btn-secondary w-100 mt-4" onclick="showInventory()">Cancel</button>
            </form>
        </div>

        <!-- Display response from backend -->
        <div id="response" class="alert mt-3 d-none"></div>

        <!-- Inventory Section -->
        <div id = "inventoryView">
            <h2 class="mt-3">Inventory</h2>
        
            <!-- Input field for searching inventory by filename -->
            <input
            type="text"
            id="searchInput"
            class="form-control mt-3"
            placeholder="Search by name..."
            >

            <hr>

            <!-- Div to display the inventory data fetched from the backend -->
            <div id="inventory"></div>

        </div>
        


        <!-- JavaScript to handle form submission and fetch inventory data -->
        <script>
            let inventoryData = []; // Global variable to store inventory data for search functionality

            // Get the form element by its ID, stored in a variable
            const form = document.getElementById('uploadForm');

            //--- Upload Form Submission Handler ---
            form.addEventListener("submit", async (e) => {
                // Prevent the default form submission behavior, which would cause a page reload
                e.preventDefault();

                // Create FormData object from the form, which includes the file and size data
                const formData = new FormData(form);

                try {
                    // Send a POST request to the backend with the form data
                    const response = await fetch("/upload", {
                        method: 'POST',
                        body: formData
                    });

                    // Check if the response status indicates an error (not 2xx)
                    if (!response.ok) {
                        throw new Error("Server error");
                    }

                    // Parse the JSON response from the server
                    const data = await response.json();

                    loadInventory(); // Refresh the inventory list after a successful upload

                    showInventory(); // Switch to the inventory view to show the updated inventory list after uploading a new item

                    // Reset the form after successful submission to clear the input fields
                    form.reset();

                    // Displays upload response from the backend
                    document.getElementById("response").innerText =
                        JSON.stringify(data, null, 2); // Pretty-print the JSON response with indentation for better readability

                    inventoryData = data.data; // Store the fetched inventory data in the global variable for search functionality

                    const responseBox = document.getElementById("response");
                    responseBox.className = "alert alert-success mt-3"; // Update the class to show a success message
                    responseBox.innerText = "Upload successful"; // Show a simple message to indicate that the item has been saved successfully.
                    responseBox.classList.remove("d-none");

                    window.scrollTo(0, 0); // Scroll to the top of the page to ensure the response message is visible after uploading

                // Catch any errors that occur during the fetch request and display an error message
                } catch (error) {
                    document.getElementById("response").innerText =
                        "Error: " + error.message;
                }
            });

            // Load Inventory function to fetch inventory data from the backend
            async function loadInventory() {
                document.getElementById("inventory").innerText = "Loading..."; // Show loading message while fetching data

                try {
                    // Send a GET request to the backend to fetch inventory data
                    const response = await fetch("/items");

                    // Check if the response status indicates an error (not 2xx)
                    if (!response.ok) {
                        throw new Error("Failed to fetch inventory");
                    }

                    // Parse the JSON response from the server
                    const data = await response.json();

                    inventoryData = data.data; // Store the fetched inventory data in the global variable for search functionality

                    renderTable(inventoryData); // Call the function to render the inventory data in a table format

                // Catch any errors that occur during the fetch request and display an error message
                } catch (error) {
                    document.getElementById("inventory").innerText =
                        "Error loading inventory";
                }
            }

            // Function to render inventory data in a table format
            function renderTable(items) {
                const container = document.getElementById("inventory");
                container.innerHTML = ""; // Clear previous content

                /* Depricating table to be replaced with card layout
                const table = document.createElement("table");
                table.className = "table table-striped table-bordered table-hover"; // Add Bootstrap classes to the table for styling
                table.style.fontSize = "16px"; // Set a larger font size for better readability

                // Create header row
                const header = table.createTHead().insertRow();
                ["Image", "Name", "Category", "S", "M", "L", "XL", "XXL", "XXXL", "Actions"].forEach(text => {
                    const th = document.createElement("th");
                    th.innerText = text;
                    header.appendChild(th);
                });

                // Add data rows
                items.forEach(item => {
                    const row = table.insertRow();
                    row.style.lineHeight = "1.6"; // Increase line height for better spacing between rows
                    row.style.verticalAlign = "middle"; // Vertically center the content in the row
                    row.style.padding = "10px"; // Add padding to the row for better spacing
                    row.style.borderBottom = "10px solid #f8f9fa"; // Add a thicker bottom border to create more space between rows, using a light color to blend with the background

                    // --- Image Cell ---
                    const imgCell = row.insertCell();
                    const img = document.createElement("img");

                    img.src = `/images/${item.filename}`; // Set the source of the image to the URL where the backend serves uploaded images
                    img.width = 80; // adjust size as needed
                    img.className = "img-thumbnail"; // Add Bootstrap class to the image for styling

                    // Append the image element to the cell
                    imgCell.appendChild(img);

                    const nameInput = document.createElement("input");
                    nameInput.type = "text";
                    nameInput.className = "form-control form-control-sm"; // Add Bootstrap classes to the input for styling
                    nameInput.value = item.display_name || item.filename; // Use display_name if available, otherwise fallback to filename

                    nameInput.name = "display_name"; // Set the name attribute for the input, which can be used to identify the field when sending data to the backend
                    nameInput.id = `display_name-${item.id}`; // Set the id attribute for the input, which can be used for labeling and accessibility purposes

                    // Append the name input to the second cell in the row
                    row.insertCell().appendChild(nameInput); // Append the name input to the second cell in the row

                    // Map category values to user-friendly labels for display in the table
                    const categoryLabels = {
                        "adult_10": "Adult Shirt ($10)",
                        "adult_15": "Adult Shirt ($15)",
                        "hoodie": "Hoodie",
                        "child": "Child Shirt"
                    };

                    // Map category values to user-friendly labels for display in the table
                    row.insertCell().innerText = categoryLabels[item.category] || item.category; // Display the user-friendly category label, or fallback to the raw category value if no label is defined

                    // Helper function to create an input cell for a given size
                    function createInputCell(value, name, id) {
                        const input = document.createElement("input");
                        input.type = "number";
                        input.className = "form-control form-control-lg"; // Add Bootstrap classes to the input for styling
                        input.style.minWidth = "60px"; // Set a minimum width for the input to prevent it from being too small
                        input.value = value ?? ""; // Use nullish coalescing operator to set empty string if value is null or undefined

                        input.name = name; // Set the name attribute for the input, which can be used to identify the field when sending data to the backend
                        input.id = `${name}-${item.id}`; // Set the id attribute for the input, which can be used for labeling and accessibility purposes

                        return input;
                    }

                    // Create input cells for each size and append them to the row
                    const sInput = createInputCell(item.size_s, "size_s", item.id);
                    const mInput = createInputCell(item.size_m, "size_m", item.id);
                    const lInput = createInputCell(item.size_l, "size_l", item.id);
                    const xlInput = createInputCell(item.size_xl, "size_xl", item.id);
                    const xxlInput = createInputCell(item.size_xxl, "size_xxl", item.id);
                    const xxxlInput = createInputCell(item.size_xxxl, "size_xxxl", item.id);

                    // Append the input elements to their respective cells in the row
                    row.insertCell().appendChild(sInput);
                    row.insertCell().appendChild(mInput);
                    row.insertCell().appendChild(lInput);
                    row.insertCell().appendChild(xlInput);
                    row.insertCell().appendChild(xxlInput);
                    row.insertCell().appendChild(xxxlInput);

                    // Create action cell for Save and Delete buttons
                    const actionCell = row.insertCell();
                    actionCell.style.minWidth = "140px"; // Set a minimum width for the action cell to ensure buttons have enough space

                    // --- Save Button ---
                    const saveBtn = document.createElement("button");
                    saveBtn.innerText = "Save";
                    saveBtn.className = "btn btn-primary btn-lg w-100 mb-2"; // Add Bootstrap classes to the button for styling

                    saveBtn.onclick = async () => {
                        await fetch(`/update-item/${item.id}`, {
                            method: "PUT",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                display_name: nameInput.value || item.filename, // Use the value from the name input, or fallback to the original filename if the input is empty
                                size_s: sInput.value || null, // Convert empty string to null for backend compatibility
                                size_m: mInput.value || null,
                                size_l: lInput.value || null,
                                size_xl: xlInput.value || null,
                                size_xxl: xxlInput.value || null,
                                size_xxxl: xxxlInput.value || null
                            })
                        });

                        window.scrollTo(0, 0); // Scroll to the top of the page to ensure the response message is visible after saving

                        const responseBox = document.getElementById("response");
                        responseBox.className = "alert alert-success mt-3"; // Update the class to show a success message
                        responseBox.innerText = "Item saved"; // Show a simple message to indicate that the item has been updated successfully.
                        responseBox.classList.remove("d-none");

                        loadInventory();
                    };

                    actionCell.appendChild(saveBtn);

                    // --- Delete Button ---
                    const deleteBtn = document.createElement("button");
                    deleteBtn.innerText = "Delete";
                    deleteBtn.className = "btn btn-danger btn-lg w-100"; // Add Bootstrap classes to the button for styling

                    deleteBtn.onclick = async () => {
                        // Show a confirmation dialog to the user before proceeding with the deletion.
                        if (!confirm("Are you sure you want to delete this item?")) {
                            return; // Exit the function if the user cancels the deletion
                        }

                        await fetch(`/delete-item/${item.id}`, {
                            method: "DELETE"
                        });

                        window.scrollTo(0, 0); // Scroll to the top of the page to ensure the response message is visible after deletion

                        const responseBox = document.getElementById("response");
                        responseBox.className = "alert alert-danger mt-3";
                        responseBox.innerText = "Item deleted";
                        responseBox.classList.remove("d-none");

                        loadInventory();
                    };

                    actionCell.appendChild(deleteBtn);
                });

                // Add table to page
                container.appendChild(table);
                */
                
                // --- New Card Layout ---
                items.forEach(item => {
                    // Create a card element for each inventory item to display the image and details in a more visually appealing way
                    const card = document.createElement("div");
                    card.className = "card p-4 mb-4 shadow-sm"; // Add Bootstrap classes to the card for styling

                    // Create a top row within the card to hold the image and name input side by side
                    const topRow = document.createElement("div");
                    topRow.className = "d-flex align-items-stretch mb-3"; // Use flexbox to align items in the top row

                    // Create an image element to display the shirt image, using the filename from the inventory data to construct the image URL
                    const img = document.createElement("img");
                    img.src = `/images/${item.filename}`; // Set the source of the image to the URL where the backend serves uploaded images
                    img.width = 80; // adjust size as needed
                    img.style.flexShrink = "0"; // Prevent the image from shrinking in height when the name input is long
                    img.className = "img-thumbnail me-3"; // Add Bootstrap class to the image for styling and margin

                    topRow.appendChild(img); // Append the image element to the top row

                    const nameText = document.createElement("div");
                    nameText.innerText = item.display_name || item.filename;
                    nameText.className = "fw-bold";

                    nameText.style.wordBreak = "break-word";
                    nameText.style.flex = "1";
                    nameText.style.marginLeft = "10px";

                    topRow.appendChild(nameText);


                    card.appendChild(topRow); // Append the top row to the card

                    // Map category values to user-friendly labels for display in the card
                    const categoryLabels = {
                        "adult_10": "Adult Shirt ($10)",
                        "adult_15": "Adult Shirt ($15)",
                        "hoodie": "Hoodie",
                        "child": "Child Shirt"
                    };

                    // Create a div element to display the category of the shirt, using the mapped user-friendly label for better readability
                    const categoryText = document.createElement("div");
                    categoryText.className = "text-muted mb-3"; // Add Bootstrap classes for styling
                    categoryText.innerText = (categoryLabels[item.category] || item.category || "Uncategorized"); // Display the user-friendly category label, or fallback to the raw category value if no label is defined, or "Uncategorized" if category is null or undefined

                    card.appendChild(categoryText); // Append the category text to the card, below the top row

                    // Create a container for the size inputs, using Bootstrap grid classes to create a responsive layout
                    const sizeContainer = document.createElement("div");
                    sizeContainer.className = "row g-3 mb-3"; // Use Bootstrap grid classes to create a responsive layout for the size inputs

                    // --- Helper function to create a size input with a label, which will be used to create inputs for each shirt size
                    function createSizeInput(label, value) {
                        const col = document.createElement("div");
                        col.className = "col-4 text-center"; // Each size input will take up 4 columns in the grid (3 inputs per row)

                        const labelDiv = document.createElement("div");
                        labelDiv.innerText = label; // Set the label text to indicate which size the input is for
                        labelDiv.className = "small text-muted"; // Add Bootstrap classes to style the label

                        const input = document.createElement("input");
                        input.type = "number";
                        input.value = value ?? ""; // Use nullish coalescing operator to set empty string if value is null or undefined
                        input.className = "form-control text-center form-control-sm"; // Add Bootstrap classes for styling and center the text in the input

                        // Set the name and id attributes for the input, which can be used to identify the field when sending data to the backend and for labeling purposes
                        if (value === null || value === "") {
                            input.placeholder = "-"; // Set a placeholder of "-" if the value is null or empty to indicate that there is no stock for that size, while still allowing the user to enter a value if they want to update it
                        }
                        
                        input.min = 0; // Set the minimum value for the input to prevent negative numbers

                        // Clear negative values immediately when the user types them in
                        input.addEventListener("input", () => {
                            if (input.value < 0) {
                                input.value = ""; // Reset the value to an empty string if the user enters a negative number
                            }
                        });

                        col.appendChild(labelDiv); // Append the label to the column
                        col.appendChild(input); // Append the input to the column

                        return { col, input }; // Return both the column and the input element for later use
                    }

                    // Create size inputs for each shirt size and append them to the size container
                    const s = createSizeInput("S", item.size_s);
                    const m = createSizeInput("M", item.size_m);
                    const l = createSizeInput("L", item.size_l);
                    const xl = createSizeInput("XL", item.size_xl);
                    const xxl = createSizeInput("XXL", item.size_xxl);
                    const xxxl = createSizeInput("XXXL", item.size_xxxl);

                    // Append the size input columns to the size container, which will arrange them in a grid layout
                    [sizeContainer.appendChild(s.col),
                    sizeContainer.appendChild(m.col),
                    sizeContainer.appendChild(l.col),
                    sizeContainer.appendChild(xl.col),
                    sizeContainer.appendChild(xxl.col),
                    sizeContainer.appendChild(xxxl.col)
                    ]

                    card.appendChild(sizeContainer); // Append the size container to the card, below the category text

                    // Create a container for the action buttons (Save and Delete), using flexbox to arrange them horizontally with a gap between them
                    const actionContainer = document.createElement("div");
                    actionContainer.className = "d-flex gap-2 mt-2"; // Use flexbox to arrange the action buttons with a gap between them

                    const editBtn = document.createElement("button");
                    editBtn.innerText = "Edit";
                    editBtn.className = "btn btn-secondary w-100"; // Add Bootstrap classes to the button for styling

                    editBtn.onclick = () => showEdit(item); // Call the function to show the edit form when the Edit button is clicked

                    // --- Delete Button ---
                    const deleteBtn = document.createElement("button");
                    deleteBtn.innerText = "Delete";
                    deleteBtn.className = "btn btn-danger w-100"; // Add Bootstrap classes to the button for styling

                    //--- Delete Handler ---
                    deleteBtn.onclick = async () => {
                        if (!confirm("Delete this item?")) return; // Show a confirmation dialog before deleting the item

                        // Send a DELETE request to the backend to delete the item with the specified ID
                        await fetch(`/delete-item/${item.id}`, {
                            method: "DELETE"
                        });

                        loadInventory(); // Refresh the inventory list after deleting the item
                    };

                    // --- Final Append ---
                    actionContainer.appendChild(editBtn); // Append the Edit button to the action container
                    actionContainer.appendChild(deleteBtn); // Append the Delete button to the action container

                    card.appendChild(actionContainer); // Append the action container to the card, below the size inputs
                    container.appendChild(card); // Append the card to the main inventory container on the page
                })
            }

            // Add event listener to the search input field to filter inventory items as the user types
            document.getElementById("searchInput").addEventListener("input", function() {
                const query = this.value.toLowerCase();

                // Auto-load inventory if not loaded yet
                if (inventoryData.length === 0) {
                    loadInventory();
                    return;
                }

                const filtered = inventoryData.filter(item =>
                    (item.display_name || item.filename).toLowerCase().includes(query)
                );

                renderTable(filtered);
            });

            // Automatically load inventory when the page loads
            window.onload = () => {
                loadInventory();
            }
            
            // Function to toggle the visibility of the upload form when the "Upload Item" button is clicked
            function toggleUpload() {
                const section = document.getElementById("uploadView"); // Get the upload form section by its ID
                section.style.display = 
                section.style.display === "none" ? "block" : "none"; // Toggle the display of the upload section between block and none
            }

            window.onload = () => {
                loadInventory(); // Load the inventory data from the backend when the page loads
                showInventory(); // Show the inventory view by default
            };

            // --- View Switching Functions ---
            // Functions to switch between inventory view and upload form view when the respective buttons are clicked
            function showInventory() {
                const inventoryBtn = document.getElementById("inventoryBtn");
                const uploadBtn = document.getElementById("uploadBtn");

                // Ensure that the buttons exist before trying to modify their classes to prevent potential errors if the elements are not found
                if (inventoryBtn && uploadBtn) {
                    inventoryBtn.classList.add("btn-primary");
                    inventoryBtn.classList.remove("btn-secondary");

                    uploadBtn.classList.add("btn-secondary");
                    uploadBtn.classList.remove("btn-primary");
                }

                document.getElementById("inventoryView").style.display = "block"; // Show the inventory section
                document.getElementById("uploadView").style.display = "none"; // Hide the upload form section

                document.getElementById("inventoryBtn").classList.add("btn-primary"); // Highlight the inventory button to indicate it's active
                document.getElementById("inventoryBtn").classList.remove("btn-secondary"); // Remove the secondary styling from the inventory button

                document.getElementById("uploadBtn").classList.add("btn-secondary"); // Set the upload button to secondary styling to indicate it's inactive
                document.getElementById("uploadBtn").classList.remove("btn-primary"); // Remove the primary styling from the upload button
            }

            // Function to show the upload form and hide the inventory section when the "Upload" button is clicked
            function showUpload() {
                const inventoryBtn = document.getElementById("inventoryBtn");
                const uploadBtn = document.getElementById("uploadBtn");

                // Ensure that the buttons exist before trying to modify their classes to prevent potential errors if the elements are not found
                if (inventoryBtn && uploadBtn) {
                    inventoryBtn.classList.add("btn-primary");
                    inventoryBtn.classList.remove("btn-secondary");

                    uploadBtn.classList.add("btn-secondary");
                    uploadBtn.classList.remove("btn-primary");
                }

                document.getElementById("inventoryView").style.display = "none"; // Hide the inventory section
                document.getElementById("uploadView").style.display = "block"; // Show the upload form section

                document.getElementById("uploadForm").reset(); // Reset the upload form to clear any previous input values when switching to the upload view

                document.getElementById("uploadBtn").classList.add("btn-primary"); // Highlight the upload button to indicate it's active
                document.getElementById("uploadBtn").classList.remove("btn-secondary"); // Remove the secondary styling from the upload button
                
                document.getElementById("inventoryBtn").classList.add("btn-secondary"); // Set the inventory button to secondary styling to indicate it's inactive
                document.getElementById("inventoryBtn").classList.remove("btn-primary"); // Remove the primary styling from the inventory button
            }

        </script>

    </div>
</body>
</html>
