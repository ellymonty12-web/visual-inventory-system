<!DOCTYPE html>
<html>
<head>
    <!-- Include Bootstrap CSS for styling the form and table -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>VIMS Upload</title>
</head>
<body class="bg-light">
    <div class="container mt-5">

    <!-- Form for uploading shirt image and size data -->
    <h1 class="mb-4">Upload Shirt</h1>
    <form id="uploadForm" class="card p-4 shadow-sm">
        <!-- File input for shirt image
         NOTE: type="file" allows users to select a file from their device
         NOTE: The 'name' attribute must match the expected field name in the backend -->
        <div class="mb-3">
            <input type="file"  name="image" class="form-control" required>
        </div>

        <!-- Size inputs 
         NOTE: type="number" creates a numeric input field
         NOTE: The 'name' attribute must match the expected field name in the backend
         NOTE: The 'min' attribute sets the minimum value for the input -->
         <div class="mb-3">
            <label for="size_s">S:</label>
            <input id="size_s" type="number" name="size_s" class="form-control" min="0">
         </div>

        <div class="mb-3">
            <label for="size_m">M:</label>
            <input id="size_m" type="number" name="size_m" class="form-control" min="0">
        </div>

        <div class="mb-3">
            <label for="size_l">L:</label>
            <input id="size_l" type="number" name="size_l" class="form-control" min="0">
        </div>

        <div class="mb-3">
            <label for="size_xl">XL:</label>
            <input id="size_xl" type="number" name="size_xl" class="form-control" min="0">
        </div>

        <div class="mb-3">
            <label for="size_xxl">XXL:</label>
            <input id="size_xxl" type="number" name="size_xxl" class="form-control" min="0">
        </div>

        <!-- Submit button to upload the form data to the backend -->
        <button type="submit" class="btn btn-primary w-100">Upload</button>
    </form>

    <hr>

    <h2 class="mt-5">Inventory</h2>
    <!-- Button to call the loadInventory function -->
    <button onclick="loadInventory()" class="btn btn-success mt-3">Load Inventory</button>
    <!-- Div to display the inventory data fetched from the backend -->
    <div id="inventory" class="card p-3 mt-4"></div>

    <!-- Display response from backend -->
    <pre id="response" class="bg-white p-2 mt-3"></pre>

    <!-- JavaScript to handle form submission and fetch inventory data -->
    <script>
        // Get the form element by its ID, stored in a variable
        const form = document.getElementById('uploadForm');

        // Handle form submission
        form.addEventListener("submit", async (e) => {
            // Prevent the default form submission behavior, which would cause a page reload
            e.preventDefault();

            // Create FormData object from the form, which includes the file and size data
            const formData = new FormData(form);

            try {
                // Send a POST request to the backend with the form data
                const response = await fetch("http://localhost:3000/upload", {
                    method: 'POST',
                    body: formData
                });

                // Check if the response status indicates an error (not 2xx)
                if (!response.ok) {
                    throw new Error("Server error");
                }

                // Parse the JSON response from the server
                const data = await response.json();

                // Reset the form after successful submission to clear the input fields
                form.reset();

                // Displays upload response from the backend
                document.getElementById("response").innerText =
                    JSON.stringify(data, null, 2); // Pretty-print the JSON response with indentation for better readability

            // Catch any errors that occur during the fetch request and display an error message
            } catch (error) {
                document.getElementById("response").innerText =
                    "Error: " + error.message;
            }
        });

        // Load Inventory function to fetch inventory data from the backend
        async function loadInventory() {
            try {
                // Send a GET request to the backend to fetch inventory data
                const response = await fetch("http://localhost:3000/items");

                // Check if the response status indicates an error (not 2xx)
                if (!response.ok) {
                    throw new Error("Failed to fetch inventory");
                }

                // Parse the JSON response from the server
                const data = await response.json();

                const container = document.getElementById("inventory");

                // Clear previous content
                container.innerHTML = "";

                // Create table
                const table = document.createElement("table");
                table.className = "table table-striped table-bordered table-hover"; // Add Bootstrap classes to the table for styling

                // Create header row
                const header = table.createTHead().insertRow();
                ["Image", "Filename", "S", "M", "L", "XL", "XXL", "Actions"].forEach(text => {
                    const th = document.createElement("th");
                    th.innerText = text;
                    header.appendChild(th);
                });

                // Add data rows
                data.data.forEach(item => {
                    const row = table.insertRow();

                    // --- Image Cell ---
                    const imgCell = row.insertCell();
                    const img = document.createElement("img");

                    img.src = `http://localhost:3000/images/${item.filename}`; // Set image source to the URL where the backend serves uploaded images
                    img.width = 80; // adjust size as needed
                    img.className = "img-thumbnail"; // Add Bootstrap class to the image for styling

                    // Append the image element to the cell
                    imgCell.appendChild(img);

                    // --- Other Cells ---
                    row.insertCell().innerText = item.filename;

                    function createInputCell(value, name, id) {
                        const input = document.createElement("input");
                        input.type = "number";
                        input.className = "form-control form-control-sm"; // Add Bootstrap classes to the input for styling
                        input.value = value ?? ""; // Use nullish coalescing operator to set empty string if value is null or undefined

                        input.name = name; // Set the name attribute for the input, which can be used to identify the field when sending data to the backend
                        input.id = `${name}_${item.id}`; // Set the id attribute for the input, which can be used for labeling and accessibility purposes

                        return input;
                    }

                    const sInput = createInputCell(item.size_s, "size_s", item.id);
                    const mInput = createInputCell(item.size_m, "size_m", item.id);
                    const lInput = createInputCell(item.size_l, "size_l", item.id);
                    const xlInput = createInputCell(item.size_xl, "size_xl", item.id);
                    const xxlInput = createInputCell(item.size_xxl, "size_xxl", item.id);

                    row.insertCell().appendChild(sInput);
                    row.insertCell().appendChild(mInput);
                    row.insertCell().appendChild(lInput);
                    row.insertCell().appendChild(xlInput);
                    row.insertCell().appendChild(xxlInput);

                    // --- Action Cell ---
                    const actionCell = row.insertCell();
                    
                    // --- Save Button ---
                    const saveBtn = document.createElement("button");
                    saveBtn.innerText = "Save";
                    saveBtn.className = "btn btn-primary btn-sm me-2"; // Add Bootstrap classes to the button for styling

                    // Add click event listener to the save button to send a PUT request to the backend with the updated size data
                    saveBtn.onclick = async () => {
                        // Send a PUT request to the backend with the updated size data for the specific item
                        try {
                            await fetch(`http://localhost:3000/update-item/${item.id}`, {
                                method: "PUT",
                                headers: {
                                    "Content-Type": "application/json"
                                },
                                body: JSON.stringify({
                                    size_s: sInput.value || null, // Convert empty string to null for backend compatibility
                                    size_m: mInput.value || null,
                                    size_l: lInput.value || null,
                                    size_xl: xlInput.value || null,
                                    size_xxl: xxlInput.value || null
                                })
                            });

                            // Refresh table after update
                            loadInventory();

                        } catch (error) {
                            alert("Failed to update item");
                        }
                    };

                    // Append the save button to the action cell
                    actionCell.appendChild(saveBtn);

                    // --- Delete Button ---
                    const deleteBtn = document.createElement("button");
                    deleteBtn.innerText = "Delete";
                    deleteBtn.className = "btn btn-danger btn-sm"; // Add Bootstrap classes to the button for styling

                    // Add click event listener to the delete button to send a DELETE request to the backend
                    deleteBtn.onclick = async () => {
                        try {
                            await fetch(`http://localhost:3000/delete-item/${item.id}`, {
                                method: "DELETE"
                            });

                            // Refresh table after deletion
                            loadInventory();

                        } catch (error) {
                            alert("Failed to delete item");
                        }
                    };

                    // Append the delete button to the action cell
                    actionCell.appendChild(deleteBtn);
                });

                // Add table to page
                container.appendChild(table);

            // Catch any errors that occur during the fetch request and display an error message
            } catch (error) {
                document.getElementById("inventory").innerText =
                    "Error loading inventory";
            }
        }
    </script>

    </div>
</body>
</html>
